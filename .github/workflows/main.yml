name: Windows Test Workflow

on:
workflow_dispatch:

jobs:
build:
runs-on: windows-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Test Basic Command
    run: echo Hello, workflow is running!

  - name: Download File
    run: |
      powershell -Command "Invoke-WebRequest -Uri 'https://example.com' -OutFile 'test.html'"

  - name: List Files
    run: dir

  - name: Run Sample Script
    run: |
      echo This is a test script > test.bat
      cmd /c test.bat
```
